<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LF Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
    }
    .logo { font-size: 52px; margin-bottom: 12px; }
    h1 { font-size: 30px; font-weight: 800; margin-bottom: 6px; }
    h1 span { color: #3b82f6; }
    .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 36px; line-height: 1.6; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s;
      width: 100%;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      color: #e2e8f0;
      border: 2px solid #475569;
    }
    .btn-outline:hover { background: #334155; border-color: #64748b; }
    .btn + .btn { margin-top: 12px; }
    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 28px 0;
      position: relative;
    }
    .divider-label {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      padding: 0 16px;
      font-size: 13px;
      color: #64748b;
    }
    .footer {
      margin-top: 28px;
      color: #475569;
      font-size: 12px;
    }
    @media (max-width: 500px) {
      .card { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏢</div>
    <h1>Tech <span>Corretor</span></h1>
    <p class="subtitle">Gestão de clientes, propriedades e<br>disparo de mensagens via WhatsApp</p>

    <a href="https://techcorretor.duckdns.org/" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Acessar versão web
    </a>

    <hr class="divider" />

    <p style="font-size:13px; color:#64748b; margin-bottom:16px;">Prefere instalar no computador?</p>

    <a href="/download" class="btn btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M12 5v14M5 12l7 7 7-7"/>
        <line x1="19" y1="21" x2="5" y2="21"/>
      </svg>
      Baixar para desktop
    </a>

    <div class="footer">
      LF Imóveis © 2026
    </div>
  </div>
</body>
</html>
