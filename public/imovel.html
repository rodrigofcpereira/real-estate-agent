<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <title>Imóvel — Tech Corretor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Loading ───────────────────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 14px;
      color: #64748b;
      font-size: .9rem;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ─────────────────────────────────────────────────────── */
    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 10px;
      text-align: center;
      padding: 32px 24px;
    }
    #error .err-icon { font-size: 56px; margin-bottom: 4px; }
    #error h2 { font-size: 1.15rem; font-weight: 700; color: #1e293b; }
    #error p  { font-size: .875rem; color: #64748b; max-width: 280px; line-height: 1.5; }

    /* ── Content ────────────────────────────────────────────────────── */
    #content { display: none; max-width: 680px; margin: 0 auto; padding-bottom: 40px; }

    /* ── Carousel ───────────────────────────────────────────────────── */
    .carousel-wrap {
      background: #0f172a;
      position: relative;
    }
    .carousel {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      touch-action: pan-y;
      user-select: none;
    }
    @media (min-width: 480px) { .carousel { aspect-ratio: 16/9; } }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform .32s cubic-bezier(.25,.46,.45,.94);
      will-change: transform;
    }
    .carousel-track.dragging { transition: none; }

    .carousel-slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
    }
    .carousel-slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* No photos */
    .carousel-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 10px;
      color: #475569;
    }
    .carousel-empty span { font-size: 52px; }
    .carousel-empty p { font-size: .85rem; }

    /* Arrows */
    .car-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(6px);
      border: none; width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; font-weight: 700;
      color: #1e293b; line-height: 1;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      z-index: 3; transition: opacity .15s;
    }
    .car-btn:active { opacity: .65; }
    .car-btn.prev { left: 10px; }
    .car-btn.next { right: 10px; }
    .car-btn:disabled { opacity: .25; pointer-events: none; }

    /* Counter badge */
    .car-counter {
      position: absolute; bottom: 10px; right: 12px;
      background: rgba(0,0,0,.6); color: #fff;
      font-size: .7rem; font-weight: 600;
      padding: 3px 9px; border-radius: 99px;
      z-index: 3;
    }

    /* Dots */
    .car-dots {
      display: flex; justify-content: center; gap: 6px;
      padding: 10px 0 6px; background: #0f172a;
    }
    .car-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.3);
      border: none; padding: 0; cursor: pointer;
      transition: all .2s;
    }
    .car-dot.active { background: #fff; width: 18px; border-radius: 3px; }

    /* ── Main info ─────────────────────────────────────────────────── */
    .info-card {
      background: #fff;
      padding: 20px 20px 22px;
      border-bottom: 1px solid #e2e8f0;
    }
    .prop-titulo {
      font-size: 1.2rem; font-weight: 800;
      color: #0f172a; line-height: 1.3;
      margin-bottom: 5px;
    }
    .prop-preco {
      font-size: 1.35rem; font-weight: 800;
      color: #2563eb; margin-bottom: 14px;
    }
    .prop-tags {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-bottom: 14px;
    }
    .prop-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: #eff6ff; color: #1d4ed8;
      font-size: .76rem; font-weight: 600;
      padding: 5px 10px; border-radius: 8px;
    }
    .prop-address {
      display: flex; align-items: flex-start; gap: 6px;
      font-size: .855rem; color: #475569; line-height: 1.45;
    }
    .prop-address svg { flex-shrink: 0; margin-top: 2px; }

    /* ── Section ───────────────────────────────────────────────────── */
    .section {
      background: #fff;
      margin-top: 8px;
      padding: 18px 20px;
    }
    .section-label {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: #94a3b8; margin-bottom: 10px;
    }
    .prop-desc {
      font-size: .89rem; color: #334155;
      line-height: 1.65; white-space: pre-wrap;
    }

    /* ── Footer ───────────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      padding: 28px 20px 20px;
      color: #94a3b8; font-size: .76rem;
    }
    .page-footer strong { color: #64748b; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Carregando imóvel...</span>
  </div>

  <!-- Error -->
  <div id="error">
    <span class="err-icon">🏚️</span>
    <h2>Imóvel não encontrado</h2>
    <p id="error-msg">Este link pode ter expirado ou o imóvel foi removido.</p>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Carousel -->
    <div class="carousel-wrap">
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carTrack"></div>
        <button class="car-btn prev" id="carPrev" onclick="carMover(-1)">‹</button>
        <button class="car-btn next" id="carNext" onclick="carMover(1)">›</button>
        <div class="car-counter" id="carCounter" style="display:none"></div>
      </div>
      <div class="car-dots" id="carDots" style="display:none"></div>
    </div>

    <!-- Info -->
    <div class="info-card">
      <div class="prop-titulo" id="propTitulo"></div>
      <div class="prop-preco"  id="propPreco"  style="display:none"></div>
      <div class="prop-tags"   id="propTags"></div>
      <div class="prop-address" id="propEndereco" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span id="propEnderecoTxt"></span>
      </div>
    </div>

    <!-- Description -->
    <div class="section" id="secDesc" style="display:none">
      <div class="section-label">Descrição</div>
      <div class="prop-desc" id="propDesc"></div>
    </div>

    <!-- Footer -->
    <div class="page-footer">
      <strong>Tech Corretor</strong> · Imóveis © 2026
    </div>

  </div>

  <script>
    // ── Firebase ─────────────────────────────────────────────────────
    firebase.initializeApp({
      apiKey:            "AIzaSyC27bu69OUt7p9iqRS-XIsuLWXJoU9JUCw",
      authDomain:        "tech-corretor.firebaseapp.com",
      projectId:         "tech-corretor",
      storageBucket:     "tech-corretor.firebasestorage.app",
      messagingSenderId: "441868741463",
      appId:             "1:441868741463:web:1423fd2181b3c3c104ec12"
    });
    const db = firebase.firestore();

    // ── Load ─────────────────────────────────────────────────────────
    const propId = new URLSearchParams(location.search).get('id');

    if (!propId) {
      showError('Link inválido — ID do imóvel não encontrado.');
    } else {
      db.collection('propriedades').doc(propId).get()
        .then(doc => {
          if (!doc.exists) { showError('Imóvel não encontrado.'); return; }
          render({ _id: doc.id, ...doc.data() });
        })
        .catch(e => {
          console.error(e);
          showError('Não foi possível carregar o imóvel. Tente novamente.');
        });
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error');
      el.style.display = 'flex';
      document.getElementById('error-msg').textContent = msg || '';
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function urlFoto(f) {
      return typeof f === 'object' && f !== null ? (f.url || '') : (f || '');
    }

    function formatPreco(v) {
      if (!v) return '';
      const n = parseFloat(String(v).replace(/[^\d,\.]/g, '').replace(',', '.'));
      if (isNaN(n)) return String(v);
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // ── Render ────────────────────────────────────────────────────────
    function render(prop) {
      // Title
      document.getElementById('propTitulo').textContent = prop.titulo || 'Imóvel';
      document.title = (prop.titulo || 'Imóvel') + ' — Tech Corretor';

      // Price
      const precoFmt = formatPreco(prop.preco);
      if (precoFmt) {
        document.getElementById('propPreco').textContent = precoFmt;
        document.getElementById('propPreco').style.display = 'block';
      }

      // Tags
      const tags = [];
      if (prop.tipo)      tags.push('🏷️ ' + prop.tipo);
      if (prop.area)      tags.push('📐 ' + prop.area + ' m²');
      if (prop.quartos   > 0) tags.push('🛏️ ' + prop.quartos   + (prop.quartos   > 1 ? ' quartos'   : ' quarto'));
      if (prop.banheiros > 0) tags.push('🚿 ' + prop.banheiros + (prop.banheiros > 1 ? ' banheiros' : ' banheiro'));
      if (prop.vagas     > 0) tags.push('🚗 ' + prop.vagas     + (prop.vagas     > 1 ? ' vagas'     : ' vaga'));

      document.getElementById('propTags').innerHTML = tags
        .map(t => `<span class="prop-tag">${t}</span>`).join('');

      // Address
      const end = [prop.endereco, prop.bairro, prop.cidade].filter(Boolean).join(', ');
      if (end) {
        document.getElementById('propEnderecoTxt').textContent = end;
        document.getElementById('propEndereco').style.display = 'flex';
      }

      // Description
      if (prop.descricao && prop.descricao.trim()) {
        document.getElementById('propDesc').textContent = prop.descricao;
        document.getElementById('secDesc').style.display = 'block';
      }

      // Photos
      const fotosRaw = Array.isArray(prop.fotos) && prop.fotos.length
        ? prop.fotos : (prop.foto ? [prop.foto] : []);
      const fotos = fotosRaw.map(urlFoto).filter(u => u && u.length > 0);

      buildCarousel(fotos);

      // Show
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    // ── Carousel ──────────────────────────────────────────────────────
    let carCurrent = 0;
    let carTotal   = 0;

    function buildCarousel(fotos) {
      carTotal   = fotos.length;
      carCurrent = 0;

      const track   = document.getElementById('carTrack');
      const dots    = document.getElementById('carDots');
      const counter = document.getElementById('carCounter');
      const carousel = document.getElementById('carousel');

      if (carTotal === 0) {
        track.innerHTML = `
          <div class="carousel-slide">
            <div class="carousel-empty">
              <span>🏠</span><p>Sem fotos disponíveis</p>
            </div>
          </div>`;
        document.getElementById('carPrev').style.display = 'none';
        document.getElementById('carNext').style.display = 'none';
        return;
      }

      // Slides
      track.innerHTML = fotos.map((url, i) =>
        `<div class="carousel-slide">
           <img src="${url}" alt="Foto ${i+1}" loading="${i === 0 ? 'eager' : 'lazy'}">
         </div>`
      ).join('');

      // Dots (até 12)
      if (carTotal > 1 && carTotal <= 12) {
        dots.innerHTML = fotos.map((_, i) =>
          `<button class="car-dot${i===0?' active':''}" onclick="carIr(${i})"></button>`
        ).join('');
        dots.style.display = 'flex';
      }

      // Counter
      if (carTotal > 1) counter.style.display = 'block';

      // Touch / swipe
      let sx = 0, sy = 0, dragging = false;
      carousel.addEventListener('touchstart', e => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
        dragging = false;
        track.classList.add('dragging');
      }, { passive: true });
      carousel.addEventListener('touchmove', e => {
        const dx = Math.abs(e.touches[0].clientX - sx);
        const dy = Math.abs(e.touches[0].clientY - sy);
        if (dx > dy) dragging = true;
      }, { passive: true });
      carousel.addEventListener('touchend', e => {
        track.classList.remove('dragging');
        if (!dragging) return;
        const diff = sx - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 35) carMover(diff > 0 ? 1 : -1);
      }, { passive: true });

      carAtualizar();
    }

    function carMover(dir) {
      carCurrent = Math.max(0, Math.min(carTotal - 1, carCurrent + dir));
      carAtualizar();
    }

    function carIr(idx) {
      carCurrent = idx;
      carAtualizar();
    }

    function carAtualizar() {
      document.getElementById('carTrack').style.transform   = `translateX(-${carCurrent * 100}%)`;
      document.getElementById('carCounter').textContent     = `${carCurrent + 1} / ${carTotal}`;
      document.getElementById('carPrev').disabled           = carCurrent === 0;
      document.getElementById('carNext').disabled           = carCurrent === carTotal - 1;
      document.querySelectorAll('.car-dot').forEach((d, i) =>
        d.classList.toggle('active', i === carCurrent));
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') carMover(1);
      if (e.key === 'ArrowLeft')  carMover(-1);
    });
  </script>
</body>
</html>
