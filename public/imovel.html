<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <title>Imóveis — LF Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Loading ───────────────────────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 14px;
      color: #64748b;
      font-size: .9rem;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ─────────────────────────────────────────────────────── */
    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 10px;
      text-align: center;
      padding: 32px 24px;
    }
    #error .err-icon { font-size: 56px; margin-bottom: 4px; }
    #error h2 { font-size: 1.15rem; font-weight: 700; color: #1e293b; }
    #error p  { font-size: .875rem; color: #64748b; max-width: 280px; line-height: 1.5; }

    /* ── Detail view ───────────────────────────────────────────────── */
    #content { display: none; max-width: 680px; margin: 0 auto; padding-bottom: 40px; }

    /* ── Listing view ──────────────────────────────────────────────── */
    #listing { display: none; max-width: 960px; margin: 0 auto; padding: 0 16px 48px; }

    .listing-header {
      padding: 28px 0 20px;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 24px;
    }
    .listing-header-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 6px;
    }
    .listing-logo { font-size: 28px; }
    .listing-header h1 {
      font-size: 1.35rem; font-weight: 800; color: #0f172a;
    }
    .listing-header h1 span { color: #2563eb; }
    .listing-subtitle { font-size: .85rem; color: #64748b; }

    /* Search bar */
    .listing-search {
      display: flex; gap: 8px;
      margin-top: 16px;
    }
    .listing-search input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: .875rem;
      font-family: inherit;
      color: #1e293b;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .listing-search input:focus { border-color: #2563eb; }
    .listing-search input::placeholder { color: #94a3b8; }

    /* Filter chips */
    .listing-chips {
      display: flex; gap: 7px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .lchip {
      padding: 5px 13px;
      border-radius: 99px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      font-size: .76rem; font-weight: 600;
      color: #475569; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .lchip:hover { border-color: #2563eb; color: #2563eb; }
    .lchip.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* Grid */
    .listing-count {
      font-size: .78rem; color: #94a3b8;
      margin-bottom: 16px;
    }
    .listing-count strong { color: #1e293b; }

    .listing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    /* Card */
    .lcard {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }
    .lcard:hover {
      box-shadow: 0 8px 30px rgba(0,0,0,.10);
      transform: translateY(-2px);
    }

    .lcard-img {
      aspect-ratio: 4/3;
      background: #0f172a;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .lcard-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .lcard-img-empty {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: #334155;
    }
    .lcard-foto-count {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,.65); color: #fff;
      font-size: .68rem; font-weight: 600;
      padding: 2px 8px; border-radius: 99px;
    }
    .lcard-tipo {
      position: absolute; top: 8px; left: 8px;
      background: rgba(15,23,42,.75); color: #e2e8f0;
      font-size: .68rem; font-weight: 700;
      padding: 3px 9px; border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    .lcard-body {
      padding: 14px 16px 16px;
      flex: 1; display: flex; flex-direction: column; gap: 6px;
    }
    .lcard-titulo {
      font-size: .95rem; font-weight: 700;
      color: #0f172a; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .lcard-preco {
      font-size: 1.05rem; font-weight: 800; color: #2563eb;
    }
    .lcard-details {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: .74rem; color: #64748b; font-weight: 500;
      margin-top: 2px;
    }
    .lcard-endereco {
      font-size: .76rem; color: #94a3b8;
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Empty listing */
    .listing-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 64px 20px; gap: 12px;
      color: #94a3b8; text-align: center;
    }
    .listing-empty span { font-size: 48px; }
    .listing-empty p { font-size: .88rem; }

    /* ── Carousel ───────────────────────────────────────────────────── */
    .carousel-wrap {
      background: #0f172a;
      position: relative;
    }
    .carousel {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      touch-action: pan-y;
      user-select: none;
    }
    @media (min-width: 480px) { .carousel { aspect-ratio: 16/9; } }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform .32s cubic-bezier(.25,.46,.45,.94);
      will-change: transform;
    }
    .carousel-track.dragging { transition: none; }

    .carousel-slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
    }
    .carousel-slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .carousel-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 10px; color: #475569;
    }
    .carousel-empty span { font-size: 52px; }
    .carousel-empty p { font-size: .85rem; }

    .car-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.9); backdrop-filter: blur(6px);
      border: none; width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; font-weight: 700;
      color: #1e293b; line-height: 1;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      z-index: 3; transition: opacity .15s;
    }
    .car-btn:active { opacity: .65; }
    .car-btn.prev { left: 10px; }
    .car-btn.next { right: 10px; }
    .car-btn:disabled { opacity: .25; pointer-events: none; }

    .car-counter {
      position: absolute; bottom: 10px; right: 12px;
      background: rgba(0,0,0,.6); color: #fff;
      font-size: .7rem; font-weight: 600;
      padding: 3px 9px; border-radius: 99px; z-index: 3;
    }
    .car-dots {
      display: flex; justify-content: center; gap: 6px;
      padding: 10px 0 6px; background: #0f172a;
    }
    .car-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.3);
      border: none; padding: 0; cursor: pointer; transition: all .2s;
    }
    .car-dot.active { background: #fff; width: 18px; border-radius: 3px; }

    /* ── Detail info ───────────────────────────────────────────────── */
    .detail-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 14px 16px;
      font-size: .82rem; font-weight: 600; color: #2563eb;
      text-decoration: none; cursor: pointer;
      background: #fff; border-bottom: 1px solid #e2e8f0;
    }
    .detail-back:hover { color: #1d4ed8; }

    .info-card {
      background: #fff;
      padding: 20px 20px 22px;
      border-bottom: 1px solid #e2e8f0;
    }
    .prop-titulo { font-size: 1.2rem; font-weight: 800; color: #0f172a; line-height: 1.3; margin-bottom: 5px; }
    .prop-preco  { font-size: 1.35rem; font-weight: 800; color: #2563eb; margin-bottom: 14px; }
    .prop-tags   { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .prop-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: #eff6ff; color: #1d4ed8;
      font-size: .76rem; font-weight: 600;
      padding: 5px 10px; border-radius: 8px;
    }
    .prop-address {
      display: flex; align-items: flex-start; gap: 6px;
      font-size: .855rem; color: #475569; line-height: 1.45;
    }
    .prop-address svg { flex-shrink: 0; margin-top: 2px; }

    .section { background: #fff; margin-top: 8px; padding: 18px 20px; }
    .section-label {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: #94a3b8; margin-bottom: 10px;
    }
    .prop-desc { font-size: .89rem; color: #334155; line-height: 1.65; white-space: pre-wrap; }

    .page-footer {
      text-align: center; padding: 28px 20px 20px;
      color: #94a3b8; font-size: .76rem;
    }
    .page-footer strong { color: #64748b; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span id="loadingMsg">Carregando imóveis...</span>
  </div>

  <!-- Error -->
  <div id="error">
    <span class="err-icon">🏚️</span>
    <h2>Imóvel não encontrado</h2>
    <p id="error-msg">Este link pode ter expirado ou o imóvel foi removido.</p>
  </div>

  <!-- ===== LISTING VIEW ===== -->
  <div id="listing">
    <div class="listing-header">
      <div class="listing-header-top">
        <span class="listing-logo">🏢</span>
        <h1>LF <span>Imóveis</span></h1>
      </div>
      <p class="listing-subtitle">Catálogo de imóveis disponíveis</p>
      <div class="listing-search">
        <input type="search" id="searchInput" placeholder="Buscar por título, bairro, cidade..." oninput="filtrarImoveis()" autocomplete="off">
      </div>
      <div class="listing-chips" id="chipsTipo"></div>
    </div>

    <div class="listing-count" id="listingCount"></div>
    <div class="listing-grid" id="listingGrid"></div>
    <div class="listing-empty" id="listingEmpty" style="display:none">
      <span>🔍</span>
      <p>Nenhum imóvel encontrado para esse filtro.</p>
    </div>
    <div class="page-footer"><strong>LF Imóveis</strong> · Imóveis © 2026</div>
  </div>

  <!-- ===== DETAIL VIEW ===== -->
  <div id="content">
    <a class="detail-back" onclick="voltarLista()">
      ← Voltar ao catálogo
    </a>
    <div class="carousel-wrap">
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carTrack"></div>
        <button class="car-btn prev" id="carPrev" onclick="carMover(-1)">‹</button>
        <button class="car-btn next" id="carNext" onclick="carMover(1)">›</button>
        <div class="car-counter" id="carCounter" style="display:none"></div>
      </div>
      <div class="car-dots" id="carDots" style="display:none"></div>
    </div>
    <div class="info-card">
      <div class="prop-titulo" id="propTitulo"></div>
      <div class="prop-preco"  id="propPreco"  style="display:none"></div>
      <div class="prop-tags"   id="propTags"></div>
      <div class="prop-address" id="propEndereco" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span id="propEnderecoTxt"></span>
      </div>
    </div>
    <div class="section" id="secDesc" style="display:none">
      <div class="section-label">Descrição</div>
      <div class="prop-desc" id="propDesc"></div>
    </div>
    <div class="page-footer"><strong>LF Imóveis</strong> · Imóveis © 2026</div>
  </div>

  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyC27bu69OUt7p9iqRS-XIsuLWXJoU9JUCw",
      authDomain:        "tech-corretor.firebaseapp.com",
      projectId:         "tech-corretor",
      storageBucket:     "tech-corretor.firebasestorage.app",
      messagingSenderId: "441868741463",
      appId:             "1:441868741463:web:1423fd2181b3c3c104ec12"
    });
    const db = firebase.firestore();

    // ── Helpers ───────────────────────────────────────────────────────
    function urlFoto(f) {
      return typeof f === 'object' && f !== null ? (f.url || '') : (f || '');
    }
    function formatPreco(v) {
      if (!v) return '';
      const n = parseFloat(String(v).replace(/[^\d,\.]/g, '').replace(',', '.'));
      if (isNaN(n)) return '';
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error');
      el.style.display = 'flex';
      document.getElementById('error-msg').textContent = msg || '';
    }

    // ── Router ────────────────────────────────────────────────────────
    const propId = new URLSearchParams(location.search).get('id');

    if (propId) {
      // ── DETAIL MODE ──────────────────────────────────────────────
      document.getElementById('loadingMsg').textContent = 'Carregando imóvel...';
      db.collection('propriedades').doc(propId).get()
        .then(doc => {
          if (!doc.exists) { showError('Imóvel não encontrado.'); return; }
          renderDetail({ _id: doc.id, ...doc.data() });
        })
        .catch(e => { console.error(e); showError('Não foi possível carregar o imóvel.'); });
    } else {
      // ── LISTING MODE ─────────────────────────────────────────────
      document.getElementById('loadingMsg').textContent = 'Carregando imóveis...';
      db.collection('propriedades').orderBy('createdAt', 'desc').get()
        .then(snap => {
          allImoveis = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
          buildListing();
          document.getElementById('loading').style.display = 'none';
          document.getElementById('listing').style.display = 'block';
        })
        .catch(e => { console.error(e); showError('Não foi possível carregar os imóveis.'); });
    }

    // =====================================================================
    //  LISTING
    // =====================================================================
    let allImoveis  = [];
    let tipoAtivo   = 'Todos';

    function buildListing() {
      // Monta chips de tipo
      const tipos = ['Todos', ...new Set(allImoveis.map(p => p.tipo).filter(Boolean))];
      document.getElementById('chipsTipo').innerHTML = tipos.map(t =>
        `<button class="lchip${t === 'Todos' ? ' active' : ''}" onclick="setTipo('${t}')">${t}</button>`
      ).join('');
      filtrarImoveis();
      document.title = 'Imóveis — LF Imóveis';
    }

    function setTipo(tipo) {
      tipoAtivo = tipo;
      document.querySelectorAll('.lchip').forEach(c =>
        c.classList.toggle('active', c.textContent === tipo));
      filtrarImoveis();
    }

    function filtrarImoveis() {
      const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      let lista = allImoveis;
      if (tipoAtivo !== 'Todos') lista = lista.filter(p => p.tipo === tipoAtivo);
      if (q) lista = lista.filter(p =>
        [p.titulo, p.bairro, p.cidade, p.endereco, p.descricao, p.tipo]
          .some(v => v && v.toLowerCase().includes(q))
      );
      renderGrid(lista);
    }

    function renderGrid(lista) {
      const grid  = document.getElementById('listingGrid');
      const empty = document.getElementById('listingEmpty');
      const count = document.getElementById('listingCount');

      count.innerHTML = `<strong>${lista.length}</strong> imóvel${lista.length !== 1 ? 'is' : ''} encontrado${lista.length !== 1 ? 's' : ''}`;

      if (lista.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = lista.map(p => {
        const fotosRaw = Array.isArray(p.fotos) && p.fotos.length ? p.fotos : (p.foto ? [p.foto] : []);
        const fotos    = fotosRaw.map(urlFoto).filter(Boolean);
        const capa     = fotos[0] || '';
        const precoFmt = formatPreco(p.preco);
        const end      = [p.bairro, p.cidade].filter(Boolean).join(', ');

        const det = [];
        if (p.quartos   > 0) det.push(`🛏️ ${p.quartos}`);
        if (p.banheiros > 0) det.push(`🚿 ${p.banheiros}`);
        if (p.vagas     > 0) det.push(`🚗 ${p.vagas}`);
        if (p.area)          det.push(`📐 ${p.area} m²`);

        return `
          <a class="lcard" href="?id=${p._id}">
            <div class="lcard-img">
              ${capa
                ? `<img src="${capa}" alt="${p.titulo || ''}" loading="lazy">`
                : `<div class="lcard-img-empty">🏠</div>`}
              ${p.tipo ? `<span class="lcard-tipo">${p.tipo}</span>` : ''}
              ${fotos.length > 1 ? `<span class="lcard-foto-count">📷 ${fotos.length}</span>` : ''}
            </div>
            <div class="lcard-body">
              <div class="lcard-titulo">${p.titulo || 'Sem título'}</div>
              ${precoFmt ? `<div class="lcard-preco">${precoFmt}</div>` : ''}
              ${det.length ? `<div class="lcard-details">${det.join('  ')}</div>` : ''}
              ${end ? `<div class="lcard-endereco">📍 ${end}</div>` : ''}
            </div>
          </a>`;
      }).join('');
    }

    // =====================================================================
    //  DETAIL
    // =====================================================================
    function voltarLista() {
      history.pushState({}, '', '/imovel');
      document.getElementById('content').style.display  = 'none';
      document.getElementById('loading').style.display  = 'flex';
      // Recarrega o catálogo
      db.collection('propriedades').orderBy('createdAt', 'desc').get()
        .then(snap => {
          allImoveis = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
          buildListing();
          document.getElementById('loading').style.display = 'none';
          document.getElementById('listing').style.display = 'block';
        })
        .catch(() => showError('Não foi possível recarregar o catálogo.'));
    }

    function renderDetail(prop) {
      document.getElementById('propTitulo').textContent = prop.titulo || 'Imóvel';
      document.title = (prop.titulo || 'Imóvel') + ' — LF Imóveis';

      const precoFmt = formatPreco(prop.preco);
      if (precoFmt) {
        document.getElementById('propPreco').textContent = precoFmt;
        document.getElementById('propPreco').style.display = 'block';
      }

      const tags = [];
      if (prop.tipo)         tags.push('🏷️ ' + prop.tipo);
      if (prop.area)         tags.push('📐 ' + prop.area + ' m²');
      if (prop.quartos   > 0) tags.push('🛏️ ' + prop.quartos   + (prop.quartos   > 1 ? ' quartos'   : ' quarto'));
      if (prop.banheiros > 0) tags.push('🚿 ' + prop.banheiros + (prop.banheiros > 1 ? ' banheiros' : ' banheiro'));
      if (prop.vagas     > 0) tags.push('🚗 ' + prop.vagas     + (prop.vagas     > 1 ? ' vagas'     : ' vaga'));
      document.getElementById('propTags').innerHTML = tags
        .map(t => `<span class="prop-tag">${t}</span>`).join('');

      const end = [prop.endereco, prop.bairro, prop.cidade].filter(Boolean).join(', ');
      if (end) {
        document.getElementById('propEnderecoTxt').textContent = end;
        document.getElementById('propEndereco').style.display = 'flex';
      }

      if (prop.descricao && prop.descricao.trim()) {
        document.getElementById('propDesc').textContent = prop.descricao;
        document.getElementById('secDesc').style.display = 'block';
      }

      const fotosRaw = Array.isArray(prop.fotos) && prop.fotos.length
        ? prop.fotos : (prop.foto ? [prop.foto] : []);
      buildCarousel(fotosRaw.map(urlFoto).filter(Boolean));

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    // =====================================================================
    //  CAROUSEL
    // =====================================================================
    let carCurrent = 0, carTotal = 0;

    function buildCarousel(fotos) {
      carTotal = fotos.length; carCurrent = 0;
      const track    = document.getElementById('carTrack');
      const dots     = document.getElementById('carDots');
      const counter  = document.getElementById('carCounter');
      const carousel = document.getElementById('carousel');

      if (carTotal === 0) {
        track.innerHTML = `<div class="carousel-slide"><div class="carousel-empty"><span>🏠</span><p>Sem fotos disponíveis</p></div></div>`;
        document.getElementById('carPrev').style.display = 'none';
        document.getElementById('carNext').style.display = 'none';
        return;
      }

      track.innerHTML = fotos.map((url, i) =>
        `<div class="carousel-slide"><img src="${url}" alt="Foto ${i+1}" loading="${i===0?'eager':'lazy'}"></div>`
      ).join('');

      if (carTotal > 1 && carTotal <= 12) {
        dots.innerHTML = fotos.map((_, i) =>
          `<button class="car-dot${i===0?' active':''}" onclick="carIr(${i})"></button>`
        ).join('');
        dots.style.display = 'flex';
      }
      if (carTotal > 1) counter.style.display = 'block';

      let sx = 0, sy = 0, dragging = false;
      carousel.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; dragging=false; track.classList.add('dragging'); }, {passive:true});
      carousel.addEventListener('touchmove',  e => { if(Math.abs(e.touches[0].clientX-sx)>Math.abs(e.touches[0].clientY-sy)) dragging=true; }, {passive:true});
      carousel.addEventListener('touchend',   e => { track.classList.remove('dragging'); if(!dragging) return; const d=sx-e.changedTouches[0].clientX; if(Math.abs(d)>35) carMover(d>0?1:-1); }, {passive:true});

      carAtualizar();
    }

    function carMover(dir) { carCurrent = Math.max(0, Math.min(carTotal-1, carCurrent+dir)); carAtualizar(); }
    function carIr(i)      { carCurrent = i; carAtualizar(); }
    function carAtualizar() {
      document.getElementById('carTrack').style.transform = `translateX(-${carCurrent*100}%)`;
      document.getElementById('carCounter').textContent   = `${carCurrent+1} / ${carTotal}`;
      document.getElementById('carPrev').disabled         = carCurrent === 0;
      document.getElementById('carNext').disabled         = carCurrent === carTotal-1;
      document.querySelectorAll('.car-dot').forEach((d,i) => d.classList.toggle('active', i===carCurrent));
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('content').style.display !== 'none') {
        if (e.key === 'ArrowRight') carMover(1);
        if (e.key === 'ArrowLeft')  carMover(-1);
      }
    });
  </script>
</body>
</html>
